<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBAC - Authenticate Credentials</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col justify-between fade-in">

  <!-- Dynamic Navigation Bar -->
  <nav id="navbar-container"></nav>

  <!-- Login Form Card -->
  <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
      <div class="text-center mb-6">
        <span class="text-3xl">🔑</span>
        <h2 class="text-2xl font-bold text-slate-900 tracking-tight mt-3">Verify System Credentials</h2>
        <p class="text-xs text-slate-400 mt-1">
          Provide your cryptographically secured credentials to access the console.
        </p>
      </div>

      <!-- Quick Seed Fill Info Box -->
      <div class="mb-5 bg-indigo-50 border border-indigo-100 rounded-xl p-3 text-xs text-indigo-800 space-y-1">
        <span class="font-bold">Quick Demo Accounts:</span>
        <div class="flex justify-between mt-1">
          <button type="button" class="underline font-mono cursor-pointer hover:text-indigo-900" id="fill-admin-btn">
            Fill Admin (admin@example.com)
          </button>
          <button type="button" class="underline font-mono cursor-pointer hover:text-indigo-900" id="fill-user-btn">
            Fill User (user@example.com)
          </button>
        </div>
      </div>

      <form id="login-form" class="space-y-5">
        <!-- Email -->
        <div>
          <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="admin@example.com" 
            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-center justify-between mb-1">
            <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">Security Password</label>
          </div>
          <input type="password" id="password" name="password" required placeholder="••••••••" 
            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submit-btn" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl shadow-sm transition hover:shadow cursor-pointer flex items-center justify-center">
          <span>Authenticate Credentials</span>
        </button>
      </form>

      <!-- Toggle Mode Link -->
      <div class="text-center mt-6 pt-6 border-t border-slate-100">
        <p class="text-sm text-slate-500">
          New to the secure environment? 
          <a href="/register.html" class="text-indigo-600 hover:text-indigo-700 font-semibold transition">Register Account here</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="bg-white border-t border-slate-200 py-4 text-center text-xs text-slate-400 font-mono">
    © 2026 RBAC System. Security Architecture Certified.
  </footer>

  <!-- Scripts -->
  <script type="module">
    import { Auth, apiRequest, renderNavBar, showToast } from '/js/api.js';

    document.addEventListener('DOMContentLoaded', () => {
      renderNavBar();

      // Redirect if already logged in
      if (Auth.isAuthenticated()) {
        const user = Auth.getUser();
        window.location.href = user.role === 'Admin' ? '/admin.html' : '/dashboard.html';
      }

      // Quick filling helpers
      document.getElementById('fill-admin-btn').addEventListener('click', () => {
        document.getElementById('email').value = 'admin@example.com';
        document.getElementById('password').value = 'adminpassword';
      });

      document.getElementById('fill-user-btn').addEventListener('click', () => {
        document.getElementById('email').value = 'user@example.com';
        document.getElementById('password').value = 'userpassword';
      });

      const loginForm = document.getElementById('login-form');
      const submitBtn = document.getElementById('submit-btn');

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.innerHTML = 'Authenticating Securely...';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
          const response = await apiRequest('/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password })
          });

          // Save Token & User in state
          Auth.setToken(response.token);
          Auth.setUser(response.user);

          showToast('Authentication success! Granting token...', 'success');

          // Role-Based Redirect Gate
          setTimeout(() => {
            const role = Auth.getRole();
            if (role === 'Admin') {
              window.location.href = '/admin.html';
            } else {
              window.location.href = '/dashboard.html';
            }
          }, 1000);

        } catch (err) {
          showToast(err.message, 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Authenticate Credentials';
        }
      });
    });
  </script>
</body>
</html>
