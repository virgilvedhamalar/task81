<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBAC - Manage Profile</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col justify-between fade-in">

  <!-- Dynamic Navigation Bar -->
  <nav id="navbar-container"></nav>

  <!-- Profile Management Panel -->
  <main class="flex-grow max-w-lg w-full mx-auto px-4 py-12 flex items-center justify-center">
    <div class="w-full bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
      
      <div class="flex items-center space-x-4 border-b border-slate-100 pb-5 mb-6">
        <div id="profile-avatar-container" class="h-12 w-12 bg-indigo-50 border border-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-bold text-base uppercase shrink-0">
          👤
        </div>
        <div>
          <h2 class="text-xl font-bold text-slate-900">Manage Your Profile</h2>
          <p class="text-xs text-slate-400">Keep your system access and credentials secure.</p>
        </div>
      </div>

      <form id="profile-form" class="space-y-5">
        <!-- Account Role (Read-Only) -->
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Your Cleared Role</label>
          <div class="px-4 py-2 bg-slate-50 border border-slate-150 rounded-xl text-slate-600 text-sm font-mono flex justify-between items-center">
            <span id="profile-role-text">Loading...</span>
            <span class="text-[10px] bg-indigo-50 text-indigo-700 font-bold border border-indigo-100 px-2 py-0.5 rounded uppercase">Verified</span>
          </div>
        </div>

        <!-- Name -->
        <div>
          <label for="name" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Full Name</label>
          <input type="text" id="name" required placeholder="John Doe" 
            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 text-sm transition">
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Email Address</label>
          <input type="email" id="email" required placeholder="john@example.com" 
            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 text-sm transition">
        </div>

        <!-- Change Password (Optional) -->
        <div>
          <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Update Password <span class="text-slate-400 lowercase italic">(optional)</span></label>
          <input type="password" id="password" placeholder="Leave blank to keep current password" minlength="6"
            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-500 text-sm transition">
          <p class="text-[10px] text-slate-400 mt-1">If specified, password will be securely re-hashed on submission.</p>
        </div>

        <!-- Submit Buttons -->
        <div class="pt-2">
          <button type="submit" id="submit-btn" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl shadow-sm transition hover:shadow cursor-pointer flex items-center justify-center">
            <span>Apply Secure Changes</span>
          </button>
        </div>
      </form>

    </div>
  </main>

  <footer class="bg-white border-t border-slate-200 py-4 text-center text-xs text-slate-400 font-mono">
    © 2026 RBAC System. Security Architecture Certified.
  </footer>

  <!-- Scripts -->
  <script type="module">
    import { Auth, apiRequest, guardRoute, renderNavBar, showToast } from '/js/api.js';

    // Guard route: must be logged in as standard user or administrator
    const isAuthorized = guardRoute(['User', 'Admin']);

    if (isAuthorized) {
      document.addEventListener('DOMContentLoaded', () => {
        renderNavBar();
        loadProfile();

        document.getElementById('profile-form').addEventListener('submit', handleProfileUpdate);
      });
    }

    // Load active profile from Server
    async function loadProfile() {
      try {
        const data = await apiRequest('/user/profile');
        if (data.success) {
          const profile = data.profile;
          document.getElementById('name').value = profile.name;
          document.getElementById('email').value = profile.email;
          document.getElementById('profile-role-text').innerText = `${profile.role} (Created ${new Date(profile.createdAt).toLocaleDateString()})`;
          
          const initials = (profile.name || 'US').split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
          document.getElementById('profile-avatar-container').innerText = initials;
        }
      } catch (err) {
        showToast('Profile load failed: ' + err.message, 'error');
      }
    }

    // Submit profile update
    async function handleProfileUpdate(e) {
      e.preventDefault();

      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = 'Updating Profile...';

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const body = { name, email };
      if (password) body.password = password;

      try {
        const res = await apiRequest('/user/profile', {
          method: 'PUT',
          body: JSON.stringify(body)
        });

        if (res.success) {
          showToast(res.message, 'success');
          
          // Sync new details into cache for navbar mapping
          Auth.setUser(res.user);
          renderNavBar();

          // Reset password field
          document.getElementById('password').value = '';
        }
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Apply Secure Changes';
      }
    }
  </script>
</body>
</html>
